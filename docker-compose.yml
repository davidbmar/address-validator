version: "3.8"

services:
  # ── OSRM — driving route engine ───────────────────────────────────
  # Pre-process road data with setup-osrm.sh, then serve routes on port 5000.
  # Data is persisted in ./data/osrm/ so preprocessing only runs once.
  osrm:
    image: osrm/osrm-backend:latest
    container_name: osrm
    ports:
      - "5000:5000"
    volumes:
      - ./data/osrm:/data
    command: osrm-routed --algorithm mld /data/austin.osrm
    restart: unless-stopped

  # ── Address Validator API ─────────────────────────────────────────
  # Photon geocoder uses the free public API (no rate limit, no key needed).
  # OSRM routes through our self-hosted instance above.
  app:
    build: .
    container_name: address-validator
    ports:
      - "8100:8100"
    environment:
      - PHOTON_URL=https://photon.komoot.io
      - OSRM_URL=http://osrm:5000
    depends_on:
      - osrm
    restart: unless-stopped
